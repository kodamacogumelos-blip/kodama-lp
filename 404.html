<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Página não encontrada | Kodama Cogumelos</title>
  <link rel="canonical" href="https://kodamacogumelos.com.br/">
  <link rel="icon" type="image/png" href="/brand_assets/favicon_v2.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #F9F6F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(45,74,16,0.10);
      padding: 3rem 2rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .emoji { font-size: 3.5rem; margin-bottom: 1.25rem; display: block; }
    h1 {
      font-family: Georgia, 'Playfair Display', serif;
      color: #2D4A10;
      font-size: 1.75rem;
      font-weight: 900;
      margin-bottom: 0.75rem;
    }
    p {
      color: #666;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: #2D4A10;
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.875rem 2rem;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #3D6B1A; }
    .links {
      margin-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }
    .link-pill {
      display: inline-block;
      border: 1.5px solid rgba(45,74,16,0.25);
      color: #2D4A10;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      transition: background 0.15s, color 0.15s;
    }
    .link-pill:hover { background: #2D4A10; color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🍄</span>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi removido.<br>Veja nossos produtos ou volte para a página inicial.</p>
    <a href="/" class="btn">Ir para a loja</a>
    <div class="links">
      <a href="/produtos/juba-leao" class="link-pill">Juba de Leão</a>
      <a href="/produtos/cordyceps" class="link-pill">Cordyceps</a>
      <a href="/produtos/kit-essencial" class="link-pill">Kit Essencial</a>
      <a href="/sobre" class="link-pill">Sobre nós</a>
    </div>
  </div>
</body>
</html>
